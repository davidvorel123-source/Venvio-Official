<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Platba zrušena | Venvio</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800;900&family=Inter:wght@400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <style>
        .result-container {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
        }
        .result-card {
            max-width: 600px;
            padding: 4rem;
        }
        .cancel-icon {
            font-size: 5rem;
            color: #EF4444;
            margin-bottom: 1rem;
        }
    </style>
</head>
<body>
    <div class="result-container">
        <div class="result-card glass-panel fade-in-up active">
            <div class="cancel-icon">✗</div>
            <h1>Platba byla zrušena</h1>
            <p style="margin: 1.5rem 0; font-size: 1.2rem; color: var(--color-text-muted);">Platba nebyla dokončena. Váš košík zůstal uložen a můžete se k objednávce kdykoliv vrátit.</p>
            <a href="index.html" class="btn btn-primary">Zpět k objednávce</a>
        </div>
    </div>
</body>
</html>
