<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Platba úspěšná | Venvio</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800;900&family=Inter:wght@400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <style>
        .result-container {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
        }
        .result-card {
            max-width: 600px;
            padding: 4rem;
        }
        .success-icon {
            font-size: 5rem;
            color: #10B981;
            margin-bottom: 1rem;
        }
    </style>
</head>
<body>
    <div class="result-container">
        <div class="result-card glass-panel fade-in-up active">
            <div class="success-icon">✓</div>
            <h1 class="text-gradient" data-i18n="success.title">Platba proběhla úspěšně!</h1>
            <p style="margin: 1.5rem 0; font-size: 1.2rem; color: var(--color-text-muted);" data-i18n="success.desc">Děkujeme za vaši důvěru. Vaši objednávku jsme v pořádku přijali a brzy se vám ozveme na zadaný e-mail s dalšími kroky k vytvoření vašeho nového webu.</p>
            <a href="index.html" class="btn btn-primary" onclick="localStorage.removeItem('venvioCart');" data-i18n="success.btn">Zpět na hlavní stránku</a>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
